<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Proxy - Test Playground</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #6366f1; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #888; margin-bottom: 16px; }
        a { color: #6366f1; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Top Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: #1a1a2e;
            padding: 4px;
            border-radius: 12px;
        }
        .nav-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-tab:hover { color: #e0e0e0; background: #252540; }
        .nav-tab.active { background: #6366f1; color: #fff; }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab {
            padding: 12px 24px;
            background: #1a1a2e;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 16px;
        }
        .tab.active { background: #6366f1; color: #fff; }
        .tab:hover:not(.active) { background: #252540; }

        .panel { display: none; }
        .panel.active { display: block; }

        .form-group { margin-bottom: 16px; }
        label { display: block; color: #a5b4fc; margin-bottom: 8px; font-weight: 500; }

        textarea, input[type="text"], select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 120px; resize: vertical; }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #6366f1;
        }

        .row { display: flex; gap: 16px; }
        .row > * { flex: 1; }

        .image-upload {
            border: 2px dashed #2d2d44;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .image-upload:hover { border-color: #6366f1; }
        .image-upload.has-image { border-style: solid; border-color: #22c55e; }
        .image-preview { max-width: 100%; max-height: 300px; margin-top: 16px; border-radius: 8px; }

        .submit-btn {
            background: #6366f1;
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .submit-btn:hover { background: #4f46e5; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-box {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }
        .result-header {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d2d44;
        }
        .result-meta { font-size: 14px; }
        .result-meta span { color: #888; }
        .result-meta strong { color: #a5b4fc; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.openai { background: #10b981; color: #000; }
        .badge.anthropic { background: #f59e0b; color: #000; }
        .badge.ollama { background: #6366f1; color: #fff; }
        .badge.routed { background: #22c55e; color: #000; }
        .badge.override { background: #f59e0b; color: #000; }

        .result-content {
            background: #252540;
            border-radius: 8px;
            padding: 16px;
            white-space: pre-wrap;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
        }

        .thinking-box {
            background: #1e1b4b;
            border-left: 3px solid #8b5cf6;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            max-height: 300px;
            overflow-y: auto;
        }
        .thinking-box h4 {
            color: #a78bfa;
            margin: 0 0 12px 0;
            font-size: 14px;
        }
        .thinking-content {
            white-space: pre-wrap;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            color: #c4b5fd;
        }

        .loading { opacity: 0.6; pointer-events: none; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LLM Proxy</h1>
        <p class="subtitle">Unified AI gateway with routing, caching, and cost tracking</p>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="nav-tab" onclick="window.location.href='/'">Requests</button>
            <button class="nav-tab active">Playground</button>
            <button class="nav-tab" onclick="window.location.href='/#routing'">Routing</button>
            <button class="nav-tab" onclick="window.location.href='/#models'">Models</button>
            <button class="nav-tab" onclick="window.location.href='/analytics'">Analytics</button>
            <button class="nav-tab" onclick="window.location.href='/stats'">Stats</button>
            <button class="nav-tab" onclick="window.location.href='/budgets'">Budgets</button>
            <button class="nav-tab" onclick="window.location.href='/#system'">System</button>
        </div>

        <h2 style="color:#a5b4fc;margin-bottom:16px;font-size:20px;">Test Playground</h2>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chat')">Chat Completion</button>
            <button class="tab" onclick="switchTab('vision')">Vision Analysis</button>
            <button class="tab" onclick="switchTab('websearch')">Web Search</button>
            <button class="tab" onclick="switchTab('whisper')">Speech to Text</button>
            <button class="tab" onclick="switchTab('tts')">Text to Speech</button>
        </div>

        <!-- Chat Panel -->
        <div id="chat-panel" class="panel active">
            <div class="form-group">
                <label>Prompt</label>
                <textarea id="chat-prompt" placeholder="Enter your prompt here...">Tell me a short joke about programming.</textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Sensitive</label>
                    <select id="chat-sensitive">
                        <option value="false">false (can use cloud)</option>
                        <option value="true">true (local only)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Precision</label>
                    <select id="chat-precision">
                        <option value="low">low</option>
                        <option value="medium" selected>medium</option>
                        <option value="high">high</option>
                        <option value="very_high">very_high</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Model Override (optional - leave empty to use routing)</label>
                <select id="chat-model">
                    <option value="">-- Use automatic routing --</option>
                </select>
            </div>

            <button class="submit-btn" id="chat-submit" onclick="submitChat()">Send Request</button>

            <div id="chat-result" class="result-box" style="display:none;">
                <div class="result-header" id="chat-result-header"></div>
                <div class="result-content" id="chat-result-content"></div>
            </div>
        </div>

        <!-- Vision Panel -->
        <div id="vision-panel" class="panel">
            <div class="form-group">
                <label>Image</label>
                <div class="image-upload" id="image-drop" onclick="document.getElementById('image-input').click()">
                    <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
                    <p>Click or drag an image here</p>
                    <img id="image-preview" class="image-preview" style="display:none">
                </div>
            </div>

            <div class="form-group">
                <label>Prompt</label>
                <textarea id="vision-prompt" placeholder="What should I analyze in this image?">Describe what you see in this image in detail.</textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Sensitive</label>
                    <select id="vision-sensitive">
                        <option value="false">false (can use cloud)</option>
                        <option value="true">true (local only)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Precision</label>
                    <select id="vision-precision">
                        <option value="low">low</option>
                        <option value="medium" selected>medium</option>
                        <option value="high">high</option>
                        <option value="very_high">very_high</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Model Override (optional - leave empty to use routing)</label>
                <select id="vision-model">
                    <option value="">-- Use automatic routing --</option>
                </select>
            </div>

            <button class="submit-btn" id="vision-submit" onclick="submitVision()">Analyze Image</button>

            <div id="vision-result" class="result-box" style="display:none;">
                <div class="result-header" id="vision-result-header"></div>
                <div class="result-content" id="vision-result-content"></div>
            </div>
        </div>

        <!-- Web Search Panel -->
        <div id="websearch-panel" class="panel">
            <div class="form-group">
                <label>Search Query</label>
                <textarea id="websearch-query" placeholder="What would you like to search for?">What are the latest developments in AI in December 2025?</textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Provider</label>
                    <select id="websearch-provider">
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="openai">OpenAI (GPT)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Max Searches</label>
                    <select id="websearch-max-uses">
                        <option value="1">1</option>
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                        <option value="10">10</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Allowed Domains (optional, comma-separated)</label>
                <input type="text" id="websearch-domains" placeholder="e.g. wikipedia.org, github.com, docs.python.org">
            </div>

            <div class="form-group">
                <label>Model</label>
                <select id="websearch-model">
                    <optgroup label="Anthropic">
                        <option value="claude-sonnet-4-5-20250929">Claude Sonnet 4.5</option>
                        <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                        <option value="claude-opus-4-5-20251101">Claude Opus 4.5</option>
                    </optgroup>
                    <optgroup label="OpenAI">
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                        <option value="o1">O1</option>
                        <option value="o1-mini">O1 Mini</option>
                        <option value="o3-mini">O3 Mini</option>
                    </optgroup>
                </select>
            </div>

            <button class="submit-btn" id="websearch-submit" onclick="submitWebSearch()">🔍 Search</button>

            <div id="websearch-result" class="result-box" style="display:none;">
                <div class="result-header" id="websearch-result-header"></div>
                <div id="websearch-sources" style="margin-bottom:16px;"></div>
                <div class="result-content" id="websearch-result-content"></div>
            </div>
        </div>

        <!-- Whisper Panel -->
        <div id="whisper-panel" class="panel">
            <div class="form-group">
                <label>Audio File</label>
                <div class="image-upload" id="audio-drop" onclick="document.getElementById('audio-input').click()">
                    <input type="file" id="audio-input" accept="audio/*,.wav,.mp3,.m4a,.ogg,.flac,.webm" style="display:none" onchange="handleAudioSelect(event)">
                    <p id="audio-placeholder">Click or drag an audio file here (wav, mp3, m4a, ogg, flac, webm)</p>
                    <p id="audio-filename" style="display:none; color:#22c55e; font-weight:600;"></p>
                </div>
            </div>

            <div class="form-group">
                <label>Or Record Audio</label>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <button class="submit-btn" id="record-btn" onclick="toggleRecording()" style="margin-top:0; background:#ef4444;">
                        🎤 Start Recording
                    </button>
                    <button class="submit-btn" id="playback-btn" onclick="playbackRecording()" style="margin-top:0; background:#6366f1; display:none;">
                        ▶️ Playback
                    </button>
                    <span id="recording-status" style="color:#888;"></span>
                </div>
                <div id="audio-level-indicator" style="display:none; margin-top:12px; height:40px; background:#1e1e2e; border-radius:8px; padding:8px; border:1px solid #374151;">
                    <div style="display:flex; align-items:flex-end; justify-content:center; height:100%; gap:2px;">
                        <div id="audio-bars" style="display:flex; align-items:flex-end; justify-content:center; gap:2px; flex:1; height:100%;">
                            <!-- Audio level bars will be generated here -->
                        </div>
                    </div>
                </div>
                <p id="https-warning" style="display:none; color:#f59e0b; font-size:12px; margin-top:8px;">
                    ⚠️ Microphone requires HTTPS. Use file upload instead.
                </p>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Mode</label>
                    <select id="whisper-mode">
                        <option value="single">Single-shot (full transcription)</option>
                        <option value="stream">Streaming (progressive results)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Routing</label>
                    <select id="whisper-sensitive">
                        <option value="true">Local (sensitive=true)</option>
                        <option value="false">Cloud/OpenAI (sensitive=false)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Model (optional)</label>
                    <input type="text" id="whisper-model" placeholder="e.g. large-v3-turbo, whisper-1">
                </div>
                <div class="form-group">
                    <label>Language (optional)</label>
                    <input type="text" id="whisper-language" placeholder="e.g. en, fr, de, es">
                </div>
            </div>

            <button class="submit-btn" id="whisper-submit" onclick="submitWhisper()">Transcribe</button>

            <div id="whisper-result" class="result-box" style="display:none;">
                <div class="result-header" id="whisper-result-header"></div>
                <div class="result-content" id="whisper-result-content"></div>
            </div>
        </div>

        <!-- TTS Panel -->
        <div id="tts-panel" class="panel">
            <div class="form-group">
                <label>Text to speak</label>
                <textarea id="tts-text" placeholder="Enter text to synthesize...">Hello! This is a test of the text to speech system. How does it sound?</textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Voice</label>
                    <select id="tts-voice">
                        <option value="alloy">alloy (American Female)</option>
                        <option value="echo">echo (American Male)</option>
                        <option value="fable">fable (British Female)</option>
                        <option value="onyx" selected>onyx (British Male)</option>
                        <option value="nova">nova (American Female)</option>
                        <option value="shimmer">shimmer (American Female)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Speed</label>
                    <input type="range" id="tts-speed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('tts-speed-val').textContent=this.value">
                    <span id="tts-speed-val" style="color:#22c55e; font-weight:600;">1.0</span>x
                </div>
            </div>

            <div class="form-group">
                <label>Format</label>
                <select id="tts-format">
                    <option value="mp3">MP3</option>
                    <option value="wav">WAV</option>
                </select>
            </div>

            <button class="submit-btn" id="tts-submit" onclick="submitTTS()">Speak</button>

            <div id="tts-result" class="result-box" style="display:none;">
                <div class="result-header" id="tts-result-header"></div>
                <div id="tts-audio-container"></div>
            </div>
        </div>
    </div>

    <script>
        const PLAYGROUND_USECASE = 'test_playground';
        let selectedImageBase64 = null;
        let allModels = [];

        // Load available models for dropdowns
        async function loadModelSelectors() {
            try {
                const resp = await fetch('/v1/models');
                const data = await resp.json();
                allModels = (data.data || []).filter(m => m.id !== 'auto').sort((a, b) => a.id.localeCompare(b.id));

                updateModelDropdowns('chat');
                updateModelDropdowns('vision');

                // Add event listeners for sensitive selection changes
                document.getElementById('chat-sensitive').addEventListener('change', () => updateModelDropdowns('chat'));
                document.getElementById('vision-sensitive').addEventListener('change', () => updateModelDropdowns('vision'));
            } catch (e) {
                console.error('Failed to load models:', e);
            }
        }

        // Filter models based on sensitive setting
        function getFilteredModels(sensitive) {
            if (sensitive === 'true') {
                // Show only local models
                return allModels.filter(m => m.local === true);
            }
            // Show all models when sensitive=false
            return allModels;
        }

        // Update model dropdown based on current sensitive selection
        function updateModelDropdowns(panelType) {
            const sensitiveValue = document.getElementById(`${panelType}-sensitive`).value;
            const modelSelect = document.getElementById(`${panelType}-model`);
            const currentValue = modelSelect.value;
            const filteredModels = getFilteredModels(sensitiveValue);

            // Clear existing options (except the first one)
            while (modelSelect.options.length > 1) {
                modelSelect.remove(1);
            }

            // Add filtered models
            filteredModels.forEach(model => {
                const opt = document.createElement('option');
                opt.value = model.id;
                opt.textContent = model.id;
                modelSelect.appendChild(opt);
            });

            // Restore previous selection if still available, otherwise reset
            if (filteredModels.some(m => m.id === currentValue)) {
                modelSelect.value = currentValue;
            } else {
                modelSelect.value = '';
            }
        }

        loadModelSelectors();

        // Helper to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatLatency(ms) {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            
            // Always show milliseconds as main text
            const mainText = ms + 'ms';
            
            // Always show minutes + seconds in muted text below
            const mutedText = minutes + 'm ' + seconds + 's';
            
            return mainText + '<div style="font-size: 11px; color: #888; margin-top: 2px;">' + mutedText + '</div>';
        }

        // Parse <think> tags from response and render properly
        function renderResponseWithThinking(content, resultContent) {
            const thinkMatch = content.match(/^<think>([\s\S]*?)<\/think>([\s\S]*)$/);
            if (thinkMatch) {
                const thinkingContent = thinkMatch[1].trim();
                const actualResponse = thinkMatch[2].trim();

                // Clear existing content
                resultContent.innerHTML = '';

                // Add thinking box
                const thinkingBox = document.createElement('div');
                thinkingBox.className = 'thinking-box';
                thinkingBox.innerHTML = '<h4>💭 Thinking</h4><div class="thinking-content">' + escapeHtml(thinkingContent) + '</div>';
                resultContent.appendChild(thinkingBox);

                // Add actual response
                const responseDiv = document.createElement('div');
                responseDiv.textContent = actualResponse;
                resultContent.appendChild(responseDiv);
            } else {
                // No thinking tags, just display normally
                resultContent.textContent = content;
            }
        }

        // Safely parse JSON but preserve raw text for error display
        async function parseJsonSafe(resp) {
            const raw = await resp.text();
            try {
                return { data: JSON.parse(raw), raw };
            } catch (e) {
                return { data: null, raw };
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector('.tab[onclick*="' + tab + '"]').classList.add('active');
            document.getElementById(tab + '-panel').classList.add('active');
        }

        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                const preview = document.getElementById('image-preview');
                preview.src = selectedImageBase64;
                preview.style.display = 'block';
                document.getElementById('image-drop').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        // Drag and drop
        const dropZone = document.getElementById('image-drop');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#6366f1'; });
        dropZone.addEventListener('dragleave', e => { dropZone.style.borderColor = ''; });
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('image-input').files = e.dataTransfer.files;
                handleImageSelect({target: {files: e.dataTransfer.files}});
            }
        });

        async function submitChat() {
            const btn = document.getElementById('chat-submit');
            const resultBox = document.getElementById('chat-result');
            const resultHeader = document.getElementById('chat-result-header');
            const resultContent = document.getElementById('chat-result-content');

            const prompt = document.getElementById('chat-prompt').value;
            const sensitive = document.getElementById('chat-sensitive').value === 'true';
            const precision = document.getElementById('chat-precision').value;
            const modelOverride = document.getElementById('chat-model').value.trim();

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Processing...';
            resultBox.style.display = 'none';

            const body = {
                model: modelOverride || 'auto',
                messages: [{role: 'user', content: prompt}],
                sensitive: sensitive,
                precision: precision,
                usecase: PLAYGROUND_USECASE,
                no_cache: true
            };

            const startTime = Date.now();
            try {
                const resp = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });

                const latency = Date.now() - startTime;
                const {data, raw} = await parseJsonSafe(resp);

                if (resp.ok && data) {
                    const provider = resp.headers.get('X-LLM-Proxy-Provider') || data.provider || 'unknown';
                    const model = resp.headers.get('X-LLM-Proxy-Model') || data.model || 'unknown';
                    const cost = resp.headers.get('X-LLM-Proxy-Cost-USD') || '0';
                    const isOverride = modelOverride !== '';

                    resultHeader.innerHTML =
                        '<div class="result-meta"><span>Provider:</span> <span class="badge ' + provider + '">' + provider + '</span></div>' +
                        '<div class="result-meta"><span>Model:</span> <strong>' + model + '</strong></div>' +
                        '<div class="result-meta"><span>Routing:</span> <span class="badge ' + (isOverride ? 'override' : 'routed') + '">' + (isOverride ? 'override' : 'auto-routed') + '</span></div>' +

        async function toggleRecording() {
            const btn = document.getElementById('record-btn');
            const status = document.getElementById('recording-status');

            if (!isRecording) {
                // Check if mediaDevices is available (requires HTTPS or localhost)
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert('Microphone recording requires HTTPS. Please use file upload instead.');
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];

                    // Setup audio level visualization
                    try {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        
                        // Resume audio context if suspended (required by some browsers)
                        if (audioContext.state === 'suspended') {
                            await audioContext.resume();
                        }
                        
                        analyser = audioContext.createAnalyser();
                        microphone = audioContext.createMediaStreamSource(stream);
                        microphone.connect(analyser);
                        analyser.fftSize = 256;
                        analyser.smoothingTimeConstant = 0.2; // Less smoothing for more responsive bars
                        analyser.minDecibels = -90;
                        analyser.maxDecibels = -10;
                        dataArray = new Uint8Array(analyser.frequencyBinCount);
                        
                        // Create audio level bars
                        const indicator = document.getElementById('audio-level-indicator');
                        const barsContainer = document.getElementById('audio-bars');
                        barsContainer.innerHTML = '';
                        audioBars = [];
                        for (let i = 0; i < 20; i++) {
                            const bar = document.createElement('div');
                            bar.style.width = '4px';
                            bar.style.minHeight = '4px';
                            bar.style.height = '4px';
                            bar.style.maxHeight = '32px';
                            bar.style.background = '#374151';
                            bar.style.borderRadius = '2px';
                            bar.style.transition = 'height 0.1s ease-out, background 0.1s ease-out';
                            bar.style.display = 'block';
                            bar.style.alignSelf = 'flex-end';
                            barsContainer.appendChild(bar);
                            audioBars.push(bar);
                        }
                        indicator.style.display = 'block';
                    } catch (err) {
                        console.error('Error setting up audio visualization:', err);
                        // Continue without visualization if it fails
                    }

                    // Try to get a supported audio format (prefer wav, then webm, then default)
                    const options = {};
                    const preferredTypes = [
                        'audio/webm;codecs=opus',
                        'audio/webm',
                        'audio/ogg;codecs=opus',
                        'audio/mp4'
                    ];
                    
                    for (const mimeType of preferredTypes) {
                        if (MediaRecorder.isTypeSupported(mimeType)) {
                            options.mimeType = mimeType;
                            break;
                        }
                    }

                    mediaRecorder = new MediaRecorder(stream, options);
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            audioChunks.push(e.data);
                        }
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const mimeType = mediaRecorder.mimeType || 'audio/webm';
                        const blob = new Blob(audioChunks, { type: mimeType });
                        
                        if (blob.size === 0) {
                            alert('Recording is empty. Please try again.');
                            audioChunks = [];
                            return;
                        }
                        
                        // Convert to WAV format for better compatibility with whisper servers
                        try {
                            const wavBlob = await convertToWav(blob);
                            selectedAudioFile = new File([wavBlob], 'recording.wav', { type: 'audio/wav' });
                        } catch (err) {
                            console.warn('WAV conversion failed, using original format:', err);
                            // Fallback to original format
                            let extension = 'webm';
                            if (mimeType.includes('ogg')) extension = 'ogg';
                            else if (mimeType.includes('mp4')) extension = 'm4a';
                            selectedAudioFile = new File([blob], `recording.${extension}`, { type: mimeType });
                        }
                        
                        document.getElementById('audio-placeholder').style.display = 'none';
                        document.getElementById('audio-filename').textContent = '🎤 Recording (' + (blob.size / 1024).toFixed(1) + ' KB)';
                        document.getElementById('audio-filename').style.display = 'block';
                        document.getElementById('audio-drop').classList.add('has-image');
                        
                        // Show playback button
                        document.getElementById('playback-btn').style.display = 'inline-block';
                        
                        // Stop audio visualization
                        if (animationFrameId) {
                            cancelAnimationFrame(animationFrameId);
                            animationFrameId = null;
                        }
                        if (audioContext) {
                            audioContext.close();
                            audioContext = null;
                        }
                        document.getElementById('audio-level-indicator').style.display = 'none';
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.onerror = (e) => {
                        console.error('MediaRecorder error:', e);
                        alert('Recording error occurred. Please try again.');
                    };

                    // Start recording with timeslice to ensure data is collected
                    mediaRecorder.start(100); // Collect data every 100ms
                    isRecording = true;
                    
                    // Start audio level animation now that isRecording is true
                    if (audioBars.length > 0 && analyser) {
                        updateAudioLevels();
                    }
                    
                    btn.innerHTML = '⏹ Stop Recording';
                    btn.style.background = '#22c55e';
                    status.textContent = 'Recording...';

                    // Visual recording indicator
                    let seconds = 0;
                    const timer = setInterval(() => {
                        if (!isRecording) { clearInterval(timer); return; }
                        seconds++;
                        status.textContent = 'Recording... ' + seconds + 's';
                    }, 1000);
                } catch (err) {
                    alert('Could not access microphone: ' + err.message);
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    // Request final data before stopping
                    mediaRecorder.requestData();
                    mediaRecorder.stop();
                }
                isRecording = false;
                btn.innerHTML = '🎤 Start Recording';
                btn.style.background = '#ef4444';
                status.textContent = '';
                
                // Stop audio visualization
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            }
        }

        function updateAudioLevels() {
            if (!analyser || !isRecording || !audioBars || audioBars.length === 0) {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                return;
            }

            try {
                analyser.getByteTimeDomainData(dataArray);
                
                // Calculate volume level from time domain data (waveform)
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const normalized = (dataArray[i] - 128) / 128;
                    sum += normalized * normalized;
                }
                const rms = Math.sqrt(sum / dataArray.length);
                // More sensitive: scale by 15 and ensure minimum visibility when there's any sound
                const volume = Math.min(Math.max(rms * 15, rms > 0.005 ? 0.2 : 0), 1);
                
                // Update all bars based on volume with wave pattern
                // Always show at least 2-3 bars when there's any sound
                const activeBars = Math.max(rms > 0.005 ? 3 : 0, Math.min(Math.floor(volume * audioBars.length * 1.5), audioBars.length));
                for (let i = 0; i < audioBars.length; i++) {
                    const bar = audioBars[i];
                    if (!bar) continue;
                    
                    const isActive = i < activeBars;
                    // Create wave pattern for visual interest
                    const time = Date.now() / 200;
                    const waveFactor = Math.sin((i / audioBars.length) * Math.PI * 4 + time) * 0.15 + 0.85;
                    const barLevel = isActive ? ((i + 1) / audioBars.length) * waveFactor * volume : 0;
                    // Ensure minimum height for active bars (6px minimum, up to 32px)
                    const height = isActive ? Math.max(6, 6 + (barLevel * 26)) : 4;
                    
                    bar.style.height = height + 'px';
                    bar.style.minHeight = '4px';
                    bar.style.maxHeight = '32px';
                    bar.style.display = 'block';
                    bar.style.visibility = 'visible';
                    bar.style.opacity = isActive ? '1' : '0.5';
                    
                    // Color gradient: green -> yellow -> red based on position and level
                    const position = i / audioBars.length;
                    const intensity = barLevel;
                    if (intensity < 0.3 || position < 0.4) {
                        bar.style.background = '#22c55e';
                    } else if (intensity < 0.7 || position < 0.75) {
                        bar.style.background = '#f59e0b';
                    } else {
                        bar.style.background = '#ef4444';
                    }
                }
            } catch (err) {
                console.error('Error getting audio data:', err);
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                return;
            }

            animationFrameId = requestAnimationFrame(updateAudioLevels);
        }

        async function convertToWav(blob) {
            // Create a new audio context for conversion
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await blob.arrayBuffer();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            
            // Get audio data
            const sampleRate = audioBuffer.sampleRate;
            const numberOfChannels = audioBuffer.numberOfChannels;
            const length = audioBuffer.length;
            const samples = [];
            
            // Interleave channels
            for (let i = 0; i < length; i++) {
                for (let channel = 0; channel < numberOfChannels; channel++) {
                    const sample = Math.max(-1, Math.min(1, audioBuffer.getChannelData(channel)[i]));
                    samples.push(sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                }
            }
            
            // Create WAV file
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            
            // WAV header
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numberOfChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numberOfChannels * 2, true);
            view.setUint16(32, numberOfChannels * 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, samples.length * 2, true);
            
            // Write samples
            let offset = 44;
            for (let i = 0; i < samples.length; i++) {
                view.setInt16(offset, samples[i], true);
                offset += 2;
            }
            
            audioContext.close();
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function playbackRecording() {
            if (!selectedAudioFile) {
                alert('No recording available to play');

            const btn = document.getElementById('playback-btn');

            // Start new playback

            const originalText = '▶️ Playback';
            
            audio.play();
            btn.innerHTML = '⏸️ Stop';
            
            audio.onended = () => {
                btn.innerHTML = originalText;
                currentPlaybackAudio = null;
                URL.revokeObjectURL(url);
            };
            
            audio.onerror = () => {
                alert('Error playing audio');
                btn.innerHTML = originalText;
                currentPlaybackAudio = null;
                URL.revokeObjectURL(url);
            };
        }

        async function submitWhisper() {
            if (!selectedAudioFile) {
                alert('Please select or record an audio file first');
                return;
            }

            const btn = document.getElementById('whisper-submit');
            const resultBox = document.getElementById('whisper-result');
            const resultHeader = document.getElementById('whisper-result-header');
            const resultContent = document.getElementById('whisper-result-content');

            const mode = document.getElementById('whisper-mode').value;
            const sensitive = document.getElementById('whisper-sensitive').value;
            const model = document.getElementById('whisper-model').value.trim();
            const language = document.getElementById('whisper-language').value.trim();

            // Check streaming + cloud combo
            if (mode === 'stream' && sensitive === 'false') {
                alert('Streaming mode is only available with local processing (OpenAI API does not support streaming)');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>' + (mode === 'stream' ? 'Streaming...' : 'Transcribing...');
            resultBox.style.display = 'block';
            resultHeader.innerHTML = '<div class="result-meta"><span>Status:</span> <strong>Processing...</strong></div>';
            resultContent.textContent = '';

            const formData = new FormData();
            formData.append('file', selectedAudioFile, selectedAudioFile.name);
            if (model) formData.append('model', model);
            if (language) formData.append('language', language);
            formData.append('sensitive', sensitive);

            const endpoint = mode === 'stream' ? '/v1/audio/transcriptions/stream' : '/v1/audio/transcriptions';
            const startTime = Date.now();

            try {
                if (mode === 'stream') {
                    // Streaming mode - use fetch with reader
                    const resp = await fetch(endpoint, {
                        method: 'POST',
                        body: formData
                    });

                    if (!resp.ok) {
                        const errorText = await resp.text();
                        throw new Error(errorText);
                    }

                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = '';

                    resultHeader.innerHTML =
                        '<div class="result-meta"><span>Mode:</span> <span class="badge ollama">streaming</span></div>' +
                        '<div class="result-meta"><span>Provider:</span> <span class="badge ollama">local</span></div>';

                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, {stream: true});
                        // Parse SSE data
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    if (data.text) {
                                        fullText = data.text;
                                        resultContent.textContent = fullText;
                                    }
                                    if (data.error) {
                                        resultContent.textContent = 'Error: ' + data.error;
                                    }
                                } catch (e) {
                                    // Not valid JSON, might be partial
                                    fullText += line.slice(6);
                                    resultContent.textContent = fullText;
                                }
                            }
                        }
                    }

                    const latency = Date.now() - startTime;
                    resultHeader.innerHTML =
                        '<div class="result-meta"><span>Mode:</span> <span class="badge ollama">streaming</span></div>' +
                        '<div class="result-meta"><span>Provider:</span> <span class="badge ollama">local</span></div>' +
                        '<div class="result-meta"><span>Latency:</span> <strong>' + formatLatency(latency) + '</strong></div>';

                } else {
                    // Single-shot mode
                    const resp = await fetch(endpoint, {
                        method: 'POST',
                        body: formData
                    });

                    const latency = Date.now() - startTime;
                    const provider = resp.headers.get('X-LLM-Proxy-Provider') || 'unknown';
                    const serverLatency = resp.headers.get('X-LLM-Proxy-Latency-Ms') || latency;

                    if (resp.ok) {
                        const data = await resp.json();
                        resultHeader.innerHTML =
                            '<div class="result-meta"><span>Mode:</span> <span class="badge routed">single-shot</span></div>' +
                            '<div class="result-meta"><span>Provider:</span> <span class="badge ' + (provider === 'openai' ? 'openai' : 'ollama') + '">' + provider + '</span></div>' +
                            '<div class="result-meta"><span>Latency:</span> <strong>' + formatLatency(parseInt(serverLatency)) + '</strong></div>';
                        resultContent.textContent = data.text || '(empty transcription)';
                    } else {
                        const errorText = await resp.text();
                        resultHeader.innerHTML = '<div class="result-meta error">Error: ' + resp.status + '</div>';
                        resultContent.textContent = errorText;
                    }
                }
            } catch (err) {
                resultHeader.innerHTML = '<div class="result-meta error">Request failed</div>';
                resultContent.textContent = err.message;
            }

            btn.disabled = false;
            btn.innerHTML = 'Transcribe';
        }

            }

            const btn = document.getElementById('websearch-submit');
            const resultBox = document.getElementById('websearch-result');
            const resultHeader = document.getElementById('websearch-result-header');
            const sourcesDiv = document.getElementById('websearch-sources');
            const resultContent = document.getElementById('websearch-result-content');

            const provider = document.getElementById('websearch-provider').value;
            const maxUses = parseInt(document.getElementById('websearch-max-uses').value);
            const model = document.getElementById('websearch-model').value;
            const domainsRaw = document.getElementById('websearch-domains').value.trim();
            const allowedDomains = domainsRaw ? domainsRaw.split(',').map(d => d.trim()).filter(d => d) : [];

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Searching...';
            resultBox.style.display = 'block';
            resultHeader.innerHTML = '<div class="result-meta"><span>Status:</span> <strong>Searching...</strong></div>';
            sourcesDiv.innerHTML = '';
            resultContent.textContent = '';

            const startTime = Date.now();

            try {
                const resp = await fetch('/v1/websearch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        provider: provider,
                        model: model,
                        max_uses: maxUses,
                        allowed_domains: allowedDomains.length > 0 ? allowedDomains : undefined,
                        usecase: PLAYGROUND_USECASE
                    })
                });

                const latency = Date.now() - startTime;
                const data = await resp.json();

                if (resp.ok) {
                    const providerBadge = provider === 'anthropic' ? 'anthropic' : 'openai';
                    resultHeader.innerHTML =
                        '<div class="result-meta"><span>Provider:</span> <span class="badge ' + providerBadge + '">' + provider + '</span></div>' +
                        '<div class="result-meta"><span>Model:</span> <strong>' + (data.model || model) + '</strong></div>' +
                        '<div class="result-meta"><span>Searches:</span> <strong>' + (data.search_count || 0) + '</strong></div>' +
                        '<div class="result-meta"><span>Latency:</span> <strong>' + formatLatency(latency) + '</strong></div>' +
                        (data.cost_usd ? '<div class="result-meta"><span>Cost:</span> <strong>$' + data.cost_usd.toFixed(6) + '</strong></div>' : '');

                    // Display sources/citations
                    if (data.sources && data.sources.length > 0) {
                        let sourcesHtml = '<div style="margin-bottom:16px"><div style="color:#888;font-size:12px;margin-bottom:8px">Sources (' + data.sources.length + ')</div>';
                        for (const src of data.sources) {
                            sourcesHtml += '<div style="margin-bottom:6px;padding:8px;background:#0f172a;border-radius:6px;border-left:2px solid #3b82f6">';
                            sourcesHtml += '<a href="' + escapeHtml(src.url || '') + '" target="_blank" style="color:#60a5fa;text-decoration:none;font-size:13px">' + escapeHtml(src.title || src.url) + '</a>';
                            if (src.snippet) {
                                sourcesHtml += '<div style="color:#94a3b8;font-size:11px;margin-top:4px">' + escapeHtml(src.snippet) + '</div>';
                            }
                            sourcesHtml += '</div>';
                        }
                        sourcesHtml += '</div>';
                        sourcesDiv.innerHTML = sourcesHtml;
                    }

                    resultContent.textContent = data.response || data.content || JSON.stringify(data, null, 2);
                } else {
                    resultHeader.innerHTML = '<div class="result-meta error">Error: ' + resp.status + '</div>';
                    resultContent.textContent = data.error || JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultHeader.innerHTML = '<div class="result-meta error">Request failed</div>';
                resultContent.textContent = err.message;
            }

            btn.disabled = false;
            btn.innerHTML = '🔍 Search';
        }
    </script>
</body>
</html>
